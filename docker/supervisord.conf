[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid
loglevel=info
user=root

[unix_http_server]
file=/tmp/supervisor.sock

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[program:tts-sidecar]
command=/app/venv/bin/python -m uvicorn main:app --host 0.0.0.0 --port 8765 --log-level info
directory=/app/tts-sidecar
autostart=true
autorestart=true
startretries=5
startsecs=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=MODEL_DIR="/app/models",TTS_MODEL_ID="%(ENV_TTS_MODEL_ID)s",TTS_VOICE="%(ENV_TTS_VOICE)s",TTS_SAMPLE_RATE="%(ENV_TTS_SAMPLE_RATE)s",TORCH_THREADS="2"
priority=10

[program:tolk-tts-bot]
command=dotnet /app/dotnet/TolkTtsBot.dll
directory=/app/dotnet
autostart=true
autorestart=true
startretries=5
startsecs=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=20
; Передаём PORT от Render в .NET приложение
environment=Tts__SidecarUrl="http://localhost:8765",ASPNETCORE_ENVIRONMENT="%(ENV_ASPNETCORE_ENVIRONMENT)s",Bot__Name="%(ENV_BOT_NAME)s",PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH="/usr/bin/chromium",PORT="%(ENV_PORT)s"
