services:
  - type: web
    name: ttstalk
    runtime: docker
    dockerfilePath: ./Dockerfile
    # Явно указываем порт .NET приложения
    # Render не должен путать его с портом 8765 Python sidecar
    healthCheckPath: /api/bot/status

    disk:
      name: silero-models
      mountPath: /app/models
      sizeGB: 2

    envVars:
      - key: PORT
        value: "10000"
      - key: TTS_VOICE
        value: xenia
      - key: TTS_MODEL_ID
        value: v5_5_ru
      - key: TTS_SAMPLE_RATE
        value: "48000"
      - key: TTS_SPEECH_RATE
        value: "1.0"
      - key: BOT_NAME
        value: "TTS Бот"
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: TTS_SIDECAR_URL
        value: http://localhost:8765
      - key: MODEL_DIR
        value: /app/models

    plan: standard
